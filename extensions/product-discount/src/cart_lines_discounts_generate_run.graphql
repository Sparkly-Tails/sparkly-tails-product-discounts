query Input {
  cart {
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "sparkly_product_discounts", key: "config") {
      jsonValue
    }
  }
  discount {
    discountClasses
  }
}
